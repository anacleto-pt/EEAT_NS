<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Nadador-Salvador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ══════════════════════════════════════════
   OCEAN DESIGN TOKENS
══════════════════════════════════════════ */
/* ══════════════════════════════════════════
   DESIGN TOKENS — LIGHT (DEFAULT)
══════════════════════════════════════════ */
:root{
  --foam:#e0f2fe;
  --wave:#0284c7;
  --sand:#d4890a;
  --rescue-red:#dc2626;
  --safe-green:#16a34a;
  --text-muted:#3a6d8c;
  --glass:rgba(255,255,255,0.88);
  --glass-border:rgba(2,132,199,0.18);
  --wave-dim:rgba(2,132,199,0.1);
  --wave-glow:rgba(2,132,199,0.15);
  --body-bg:linear-gradient(160deg,#dff0fb 0%,#f0f9ff 60%,#e0f2fe 100%);
  --bg:#dff0fb;
  --card-bg:var(--glass);
  --text-primary:#0c2340;
  --text-secondary:#3a6d8c;
  --text-accent:var(--wave);
  --border-color:rgba(2,132,199,0.2);
  --border-input:rgba(2,132,199,0.25);
  --accent-bg:rgba(2,132,199,0.08);
  --hover-bg:rgba(2,132,199,0.07);
  --progress-bg:rgba(2,132,199,0.15);
  --input-bg:rgba(255,255,255,0.9);
  --panel-bg:rgba(255,255,255,0.96);
  --panel-close-bg:#edf6fd;
  --summary-bg:rgba(2,132,199,0.06);
  --stat-bg:rgba(255,255,255,0.7);
  --chart-bg:rgba(255,255,255,0.7);
  --item-border:rgba(2,132,199,0.12);
  --sort-handle:#5a8fab;
  --ctx-bg:rgba(2,132,199,0.04);
  --ctx-border:rgba(2,132,199,0.18);
  --ctx-color:#0c2340;
  --ref-bg:rgba(2,132,199,0.06);
  --ref-border:rgba(2,132,199,0.2);
  --ref-color:#0369a1;
  --option-btn-bg:rgba(255,255,255,0.55);
  --sort-item-bg:rgba(255,255,255,0.5);
  --ocean-deep:#0a1628;
  --ocean-mid:#0d2444;
  --ocean-surface:#1a3a5c;
}

/* ══════════════════════════════════════════
   DESIGN TOKENS — DARK
══════════════════════════════════════════ */
body.dark{
  --wave:#0ea5e9;
  --sand:#f0c060;
  --rescue-red:#ef4444;
  --safe-green:#22c55e;
  --text-muted:#7ea8c4;
  --glass:rgba(13,36,68,0.82);
  --glass-border:rgba(14,165,233,0.15);
  --wave-dim:rgba(14,165,233,0.12);
  --wave-glow:rgba(14,165,233,0.18);
  --body-bg:linear-gradient(160deg,#0a1628 0%,#0d2244 60%,#0a1e3a 100%);
  --bg:#0a1628;
  --card-bg:var(--glass);
  --text-primary:#e0f2fe;
  --text-secondary:#7ea8c4;
  --text-accent:var(--wave);
  --border-color:#1a3a5c;
  --border-input:#1a3a5c;
  --accent-bg:rgba(14,165,233,0.12);
  --hover-bg:rgba(14,165,233,0.08);
  --progress-bg:#1a3a5c;
  --input-bg:#0a1628;
  --panel-bg:#0d2444;
  --panel-close-bg:#0a1628;
  --summary-bg:rgba(14,165,233,0.07);
  --stat-bg:#0a1628;
  --chart-bg:#0a1628;
  --item-border:#1a3a5c;
  --sort-handle:#7ea8c4;
  --ctx-bg:rgba(14,165,233,0.04);
  --ctx-border:rgba(14,165,233,0.18);
  --ctx-color:#bae6fd;
  --ref-bg:rgba(14,165,233,0.07);
  --ref-border:rgba(14,165,233,0.22);
  --ref-color:#bae6fd;
  --option-btn-bg:rgba(26,58,92,0.35);
  --sort-item-bg:rgba(26,58,92,0.45);
}

/* ══════════════════════════════════════════
   BASE
══════════════════════════════════════════ */
html{background:var(--bg);scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--body-bg) fixed;
  color:var(--text-primary);
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:80px 16px 40px;
}
.container{width:100%;max-width:720px}

/* ══════════════════════════════════════════
   WAVE HEADER
══════════════════════════════════════════ */
.wave-header{
  position:fixed;
  top:0;left:0;right:0;
  height:72px;
  pointer-events:none;
  z-index:800;
  overflow:hidden;
}
.wave-header svg{width:100%;height:100%}
.wp1{fill:rgba(2,132,199,0.1);animation:waveDrift 10s ease-in-out infinite}
.wp2{fill:rgba(14,165,233,0.07);animation:waveDrift 14s ease-in-out infinite reverse}
.wp3{fill:rgba(14,165,233,0.05);animation:waveDrift 7s ease-in-out infinite 2s}
body.dark .wp1{fill:rgba(26,58,92,0.55)}
body.dark .wp2{fill:rgba(14,165,233,0.06)}
body.dark .wp3{fill:rgba(14,165,233,0.04)}
@keyframes waveDrift{
  0%,100%{transform:translateX(0) scaleY(1)}
  33%{transform:translateX(-1.5%) scaleY(1.06)}
  66%{transform:translateX(1%) scaleY(0.96)}
}
@media(prefers-reduced-motion:reduce){.wp1,.wp2,.wp3{animation:none}}

/* ══════════════════════════════════════════
   CARDS — GLASSMORPHISM
══════════════════════════════════════════ */
.card{
  background:var(--glass);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);
  border-radius:16px;
  padding:32px;
  box-shadow:0 4px 32px rgba(14,165,233,0.1),0 1px 0 rgba(255,255,255,0.04) inset;
}

/* ══════════════════════════════════════════
   TYPOGRAPHY
══════════════════════════════════════════ */
h1{
  font-family:'Barlow Condensed',sans-serif;
  font-size:2.4rem;
  font-weight:800;
  color:var(--text-primary);
  margin-bottom:8px;
  line-height:1.05;
  letter-spacing:0.01em;
  text-transform:uppercase;
}
h2{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.5rem;
  font-weight:700;
  color:var(--text-primary);
  margin-bottom:20px;
  letter-spacing:0.02em;
  text-transform:uppercase;
}
h3{font-size:0.95rem;font-weight:600;color:var(--text-primary)}
.subtitle{color:var(--text-muted);font-size:0.9rem;margin-bottom:28px;line-height:1.55}

/* ══════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════ */
.btn{
  display:block;
  width:100%;
  padding:14px 20px;
  border:none;
  border-radius:10px;
  font-family:'Inter',sans-serif;
  font-size:1rem;
  font-weight:600;
  cursor:pointer;
  transition:transform 0.15s ease,filter 0.15s ease,box-shadow 0.15s ease;
  text-align:left;
}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(0)}

.btn-primary{
  background:var(--wave);
  color:#fff;
  box-shadow:0 2px 16px rgba(14,165,233,0.3);
}
.btn-primary:hover{filter:brightness(1.15);box-shadow:0 4px 24px rgba(14,165,233,0.5)}

.btn-secondary{
  background:rgba(14,165,233,0.1);
  color:var(--wave);
  border:1px solid rgba(14,165,233,0.28);
}
.btn-secondary:hover{background:rgba(14,165,233,0.18);border-color:rgba(14,165,233,0.5)}

.btn-timed{
  background:linear-gradient(135deg,var(--sand) 0%,#e8912a 100%);
  color:#0a1628;
  font-weight:700;
}
.btn-timed:hover{filter:brightness(1.08)}

.btn-success{
  background:rgba(34,197,94,0.12);
  color:var(--safe-green);
  border:1px solid rgba(34,197,94,0.28);
  margin-top:16px;
}
.btn-success:hover{background:rgba(34,197,94,0.22)}

.btn-ordering{
  background:linear-gradient(135deg,#7c3aed 0%,#6d28d9 100%);
  color:#fff;
}
.btn-ordering:hover{filter:brightness(1.12)}

.btn-danger{
  background:rgba(239,68,68,0.1);
  color:var(--rescue-red);
  border:1px solid rgba(239,68,68,0.28);
  border-radius:10px;
  padding:12px 20px;
  font-family:'Inter',sans-serif;
  font-size:0.92rem;
  font-weight:600;
  cursor:pointer;
  width:100%;
  transition:background 0.15s,transform 0.15s;
}
.btn-danger:hover{background:rgba(239,68,68,0.2);transform:translateY(-1px)}

/* ══════════════════════════════════════════
   MODE BUTTONS
══════════════════════════════════════════ */
.mode-buttons{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}

/* ══════════════════════════════════════════
   CHAPTER GRID
══════════════════════════════════════════ */
.chapter-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.chapter-btn{
  padding:14px 8px;
  border:1px solid var(--border-input);
  border-radius:10px;
  background:var(--accent-bg);
  color:var(--text-accent);
  font-family:'Inter',sans-serif;
  font-size:0.88rem;
  font-weight:600;
  cursor:pointer;
  text-align:center;
  transition:all 0.15s;
}
.chapter-btn:hover{
  background:rgba(14,165,233,0.15);
  border-color:var(--wave);
  box-shadow:0 0 0 3px rgba(14,165,233,0.1);
  transform:translateY(-1px);
}

/* ══════════════════════════════════════════
   NAV / META
══════════════════════════════════════════ */
.back-btn{
  background:none;
  border:none;
  color:var(--text-muted);
  font-family:'Inter',sans-serif;
  font-size:0.88rem;
  cursor:pointer;
  padding:4px 0;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:6px;
  transition:color 0.15s;
}
.back-btn:hover{color:var(--wave)}
.meta{
  font-size:0.78rem;
  color:var(--text-muted);
  font-weight:600;
  margin-bottom:6px;
  letter-spacing:0.08em;
  text-transform:uppercase;
}

/* ══════════════════════════════════════════
   PROGRESS BAR — shimmer
══════════════════════════════════════════ */
.progress-bar-wrap{
  background:var(--progress-bg);
  border-radius:99px;
  height:5px;
  margin-bottom:22px;
  overflow:hidden;
}
.progress-bar-fill{
  background:linear-gradient(90deg,var(--wave),var(--sand));
  height:100%;
  border-radius:99px;
  transition:width 0.35s ease;
  position:relative;
  overflow:hidden;
}
.progress-bar-fill::after{
  content:'';
  position:absolute;
  top:0;left:-60%;
  width:55%;
  height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);
  animation:shimmer 2.2s ease-in-out infinite;
}
@keyframes shimmer{0%{left:-60%}100%{left:160%}}
@media(prefers-reduced-motion:reduce){.progress-bar-fill::after{animation:none}}

/* ══════════════════════════════════════════
   TIMER
══════════════════════════════════════════ */
.timer-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.timer-badge{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.7rem;
  font-weight:800;
  letter-spacing:0.06em;
  padding:5px 14px;
  border-radius:10px;
  background:rgba(14,165,233,0.1);
  border:1px solid rgba(14,165,233,0.2);
  color:var(--wave);
  transition:background 0.3s,color 0.3s,border-color 0.3s;
}
.timer-badge.warn{
  background:rgba(240,192,96,0.12);
  border-color:rgba(240,192,96,0.35);
  color:var(--sand);
}
.timer-badge.danger{
  background:rgba(239,68,68,0.12);
  border-color:rgba(239,68,68,0.35);
  color:var(--rescue-red);
  animation:pulse 1s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.55}}
@media(prefers-reduced-motion:reduce){.timer-badge.danger{animation:none}}

/* ══════════════════════════════════════════
   QUESTION & OPTIONS
══════════════════════════════════════════ */
.question-text{
  font-size:1.05rem;
  font-weight:500;
  line-height:1.62;
  margin-bottom:22px;
  color:var(--text-primary);
}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.option-btn{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:13px 16px;
  border:1px solid var(--border-input);
  border-radius:10px;
  background:var(--option-btn-bg);
  cursor:pointer;
  text-align:left;
  font-family:'Inter',sans-serif;
  font-size:0.95rem;
  line-height:1.48;
  color:var(--text-primary);
  transition:border-color 0.15s,background 0.15s,box-shadow 0.15s;
  width:100%;
}
.option-btn:hover:not(:disabled){
  border-color:var(--wave);
  background:var(--hover-bg);
  box-shadow:0 0 0 3px var(--wave-dim);
}
.option-btn:disabled{cursor:default}
.option-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.05rem;
  font-weight:700;
  color:var(--wave);
  min-width:22px;
  flex-shrink:0;
  margin-top:0;
  letter-spacing:0.02em;
}
.option-btn.correct{
  border-color:var(--safe-green);
  background:rgba(34,197,94,0.1);
}
.option-btn.correct .option-label{color:var(--safe-green)}
.option-btn.wrong{
  border-color:var(--rescue-red);
  background:rgba(239,68,68,0.1);
}
.option-btn.wrong .option-label{color:var(--rescue-red)}
.option-btn.dimmed{opacity:0.38}

.continue-area{margin-top:18px;display:none}
.continue-area.visible{display:block}

/* ══════════════════════════════════════════
   REFERENCE BOX
══════════════════════════════════════════ */
.ref-box{
  display:none;
  background:var(--ref-bg);
  border:1px solid var(--ref-border);
  border-radius:10px;
  padding:11px 15px;
  margin-top:14px;
  font-size:0.88rem;
  color:var(--ref-color);
  line-height:1.5;
}
.ref-box.visible{display:flex;align-items:flex-start;gap:8px}
.ref-box-icon{font-size:1rem;flex-shrink:0}

/* ══════════════════════════════════════════
   RESULTS
══════════════════════════════════════════ */
.result-card{text-align:center}
.result-score{
  font-family:'Barlow Condensed',sans-serif;
  font-size:3.8rem;
  font-weight:800;
  color:var(--wave);
  margin:16px 0 4px;
  line-height:1;
  letter-spacing:0.02em;
}
.result-pct{font-size:1.1rem;color:var(--text-muted);margin-bottom:8px}
.result-msg{font-size:1rem;margin-bottom:20px;color:var(--text-primary)}
.result-icon{font-size:3.5rem;margin-bottom:8px}
.result-time{font-size:0.9rem;color:var(--text-muted);margin-bottom:20px}

/* ══════════════════════════════════════════
   DIVIDER — wave gradient
══════════════════════════════════════════ */
.divider{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(14,165,233,0.4),transparent);
  margin:20px 0;
  border:none;
}

/* ══════════════════════════════════════════
   TIMED BREAKDOWN
══════════════════════════════════════════ */
.breakdown{
  margin-top:8px;
  max-height:340px;
  overflow-y:auto;
  border:1px solid var(--border-color);
  border-radius:10px;
  scrollbar-width:thin;
  scrollbar-color:var(--border-color) transparent;
}
.breakdown-item{
  display:flex;
  gap:10px;
  padding:10px 14px;
  border-bottom:1px solid var(--item-border);
  font-size:0.85rem;
  align-items:flex-start;
}
.breakdown-item:last-child{border-bottom:none}
.breakdown-item.ok{background:rgba(34,197,94,0.06)}
.breakdown-item.fail{background:rgba(239,68,68,0.06)}
.breakdown-icon{font-size:1rem;flex-shrink:0;margin-top:1px}
.breakdown-text{flex:1;line-height:1.4;color:var(--text-primary)}
.breakdown-num{font-weight:700;color:var(--text-secondary);flex-shrink:0;min-width:24px}

/* ══════════════════════════════════════════
   SEARCH / SOLO
══════════════════════════════════════════ */
.search-section{border-top:1px solid var(--border-color);padding-top:20px;margin-top:4px}
.search-section h3{font-size:0.95rem;font-weight:600;color:var(--text-primary);margin-bottom:8px}
.search-row{display:flex;gap:8px;margin-bottom:8px}
.search-input{
  flex:1;
  padding:10px 14px;
  border:1px solid var(--border-input);
  border-radius:10px;
  font-family:'Inter',sans-serif;
  font-size:0.95rem;
  color:var(--text-primary);
  background:var(--input-bg);
  outline:none;
  transition:border-color 0.15s,box-shadow 0.15s;
}
.search-input:focus{border-color:var(--wave);box-shadow:0 0 0 3px var(--wave-dim)}
.search-input::placeholder{color:var(--text-secondary)}
.search-btn{
  padding:10px 18px;
  background:var(--wave);
  color:#fff;
  border:none;
  border-radius:10px;
  font-family:'Inter',sans-serif;
  font-size:0.95rem;
  font-weight:600;
  cursor:pointer;
  transition:filter 0.15s;
  white-space:nowrap;
}
.search-btn:hover{filter:brightness(1.15)}
.search-legend{font-size:0.78rem;color:var(--text-muted);line-height:1.6}
.search-error{color:var(--rescue-red);font-size:0.88rem;margin-top:4px}
.solo-meta{font-size:0.88rem;font-weight:500;color:var(--text-muted);margin-bottom:18px}

/* ══════════════════════════════════════════
   FOCUS RING
══════════════════════════════════════════ */
*:focus-visible{outline:2px solid var(--wave);outline-offset:2px}

/* ══════════════════════════════════════════
   STATS FAB
══════════════════════════════════════════ */
.stats-fab{
  position:fixed;
  top:14px;right:14px;
  z-index:900;
  background:var(--wave);
  color:#fff;
  border:none;
  border-radius:50px;
  padding:9px 16px;
  font-family:'Inter',sans-serif;
  font-size:0.85rem;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 2px 18px var(--wave-glow);
  transition:filter 0.15s,transform 0.15s,box-shadow 0.15s;
  display:flex;
  align-items:center;
  gap:6px;
  white-space:nowrap;
  line-height:1;
}
.stats-fab:hover{filter:brightness(1.12);transform:translateY(-1px)}
.stats-fab .fab-label{display:inline}

/* Dark/light toggle */
.dark-fab{
  position:fixed;
  top:14px;left:14px;
  z-index:900;
  background:var(--accent-bg);
  color:var(--text-accent);
  border:1px solid var(--glass-border);
  border-radius:50px;
  padding:9px 13px;
  font-size:1.1rem;
  cursor:pointer;
  box-shadow:0 2px 12px var(--wave-dim);
  transition:background 0.15s,transform 0.15s;
  line-height:1;
}
.dark-fab:hover{background:var(--hover-bg);transform:translateY(-1px)}

/* ══════════════════════════════════════════
   STATS OVERLAY & PANEL
══════════════════════════════════════════ */
.stats-overlay{
  position:fixed;
  inset:0;
  z-index:1000;
  background:rgba(5,12,28,0.7);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  display:flex;
  justify-content:flex-end;
}
.stats-overlay.hidden{display:none}
.stats-panel{
  background:var(--panel-bg);
  border-left:1px solid var(--glass-border);
  width:100%;
  max-width:500px;
  height:100%;
  overflow-y:auto;
  padding:24px 22px 32px;
  box-shadow:-4px 0 48px rgba(0,0,0,0.25);
  position:relative;
  scrollbar-width:thin;
  scrollbar-color:var(--border-color) transparent;
}
.stats-close{
  position:sticky;
  top:0;
  float:right;
  background:var(--panel-close-bg);
  border:1px solid var(--border-color);
  font-size:0.95rem;
  cursor:pointer;
  color:var(--text-secondary);
  line-height:1;
  padding:6px 10px;
  border-radius:8px;
  margin-bottom:-30px;
  z-index:10;
  transition:border-color 0.15s,color 0.15s;
}
.stats-close:hover{border-color:var(--wave);color:var(--wave)}
.stats-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.5rem;
  font-weight:700;
  color:var(--text-primary);
  margin-bottom:20px;
  padding-top:2px;
  clear:both;
  text-transform:uppercase;
  letter-spacing:0.04em;
}
.stats-summary{
  background:rgba(14,165,233,0.07);
  border:1px solid rgba(14,165,233,0.15);
  border-radius:12px;
  padding:18px;
  margin-bottom:20px;
}
.stats-accuracy{
  font-family:'Barlow Condensed',sans-serif;
  font-size:3rem;
  font-weight:800;
  color:var(--wave);
  line-height:1;
  margin-bottom:2px;
}
.stats-accuracy-label{font-size:0.82rem;color:var(--text-muted);margin-bottom:14px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stats-stat{
  background:var(--stat-bg);
  border:1px solid var(--border-color);
  border-radius:8px;
  padding:10px 12px;
}
.stats-stat-val{font-size:1.1rem;font-weight:700;color:var(--text-primary)}
.stats-stat-lbl{font-size:0.74rem;color:var(--text-secondary);margin-top:2px}
.stats-section-title{
  font-size:0.74rem;
  font-weight:600;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:0.09em;
  margin:20px 0 10px;
  border-top:1px solid var(--border-color);
  padding-top:16px;
}
.hist-wrap{
  overflow-x:auto;
  border:1px solid var(--border-color);
  border-radius:10px;
  scrollbar-width:thin;
  scrollbar-color:var(--border-color) transparent;
}
.hist-table{width:100%;border-collapse:collapse;font-size:0.83rem;min-width:360px}
.hist-table th{
  text-align:left;
  padding:8px 10px;
  background:var(--chart-bg);
  color:var(--text-secondary);
  font-size:0.72rem;
  text-transform:uppercase;
  letter-spacing:0.07em;
  position:sticky;
  top:0;
}
.hist-table td{
  padding:7px 10px;
  border-top:1px solid var(--item-border);
  vertical-align:middle;
  color:var(--text-primary);
}
.hist-row-green{background:rgba(34,197,94,0.07)}
.hist-row-orange{background:rgba(240,192,96,0.06)}
.hist-row-red{background:rgba(239,68,68,0.07)}
.stats-chart{
  background:var(--chart-bg);
  border:1px solid var(--border-color);
  border-radius:10px;
  padding:12px 14px;
  margin-bottom:4px;
}
.stats-chart svg text{fill:var(--text-secondary)}
.confirm-row{display:flex;gap:10px;margin-top:8px}
.confirm-row .btn{padding:11px;font-size:0.9rem;flex:1;text-align:center}
.stats-empty{text-align:center;padding:48px 20px;color:var(--text-secondary);font-size:0.95rem}

/* ══════════════════════════════════════════
   ORDERING MODE
══════════════════════════════════════════ */
.scenario-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.scenario-btn{
  padding:14px 12px;
  border:1px solid var(--border-input);
  border-radius:10px;
  background:var(--accent-bg);
  color:var(--text-accent);
  font-family:'Inter',sans-serif;
  font-size:0.88rem;
  font-weight:600;
  cursor:pointer;
  text-align:left;
  transition:all 0.15s;
  line-height:1.4;
}
.scenario-btn:hover{
  background:var(--hover-bg);
  border-color:var(--wave);
  box-shadow:0 0 0 3px var(--wave-dim);
  transform:translateY(-1px);
}
.scenario-context{
  background:var(--ctx-bg);
  border:1px solid var(--ctx-border);
  border-radius:10px;
  padding:14px 16px;
  margin-bottom:18px;
  font-size:0.9rem;
  color:var(--ctx-color);
  line-height:1.6;
}
.sort-list{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:18px;
  -webkit-user-select:none;
  user-select:none;
}
.sort-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:11px 14px;
  background:var(--sort-item-bg);
  border:1px solid var(--border-input);
  border-radius:10px;
  transition:border-color 0.15s,background 0.15s,opacity 0.15s,transform 0.18s ease;
}
.sort-ghost{
  opacity:0.94;
  box-shadow:0 8px 36px rgba(14,165,233,0.28);
  cursor:grabbing!important;
  transform:rotate(1.5deg) scale(1.04);
}
.sort-placeholder{
  border:2px dashed var(--border-input);
  border-radius:10px;
  background:var(--accent-bg);
  pointer-events:none;
  box-sizing:border-box;
}
.sort-item.correct{border-color:var(--safe-green);background:rgba(34,197,94,0.1)}
.sort-item.wrong{border-color:var(--rescue-red);background:rgba(239,68,68,0.1)}
.sort-handle{
  font-size:1.15rem;
  color:var(--text-muted);
  cursor:grab;
  padding:2px 6px;
  touch-action:none;
  flex-shrink:0;
  line-height:1;
}
.sort-handle:active{cursor:grabbing}
.sort-num{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  color:var(--wave);
  min-width:26px;
  font-size:1rem;
  flex-shrink:0;
  letter-spacing:0.02em;
}
.sort-text{flex:1;font-size:0.9rem;line-height:1.48;color:var(--text-primary)}
.sort-indicator{font-size:1rem;flex-shrink:0;margin-left:4px}
.correct-seq{
  background:rgba(34,197,94,0.08);
  border:1px solid rgba(34,197,94,0.28);
  border-radius:10px;
  padding:14px 16px;
  margin-top:14px;
}
.correct-seq-title{font-weight:700;font-size:0.88rem;color:var(--safe-green);margin-bottom:8px}
.correct-seq-item{font-size:0.85rem;color:var(--text-primary);line-height:1.5;padding:2px 0}
.correct-seq-num{color:var(--safe-green);font-weight:700;margin-right:6px}
.ordering-score{
  font-family:'Barlow Condensed',sans-serif;
  font-size:2.8rem;
  font-weight:800;
  color:var(--wave);
  line-height:1;
  margin-bottom:2px;
}
.ordering-pct{color:var(--text-muted);font-size:0.95rem}

/* ══════════════════════════════════════════
   RESUME BANNER
══════════════════════════════════════════ */
.resume-banner{
  background:rgba(14,165,233,0.08);
  border:1px solid rgba(14,165,233,0.25);
  border-radius:12px;
  padding:14px 18px;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}
.resume-text{font-size:0.92rem;color:var(--ref-color);font-weight:600;line-height:1.5;flex:1}
.resume-btns{display:flex;gap:8px;flex-shrink:0}
.resume-btns .btn{width:auto;padding:9px 14px;font-size:0.88rem;text-align:center}

/* ══════════════════════════════════════════
   REVIEW SCREEN
══════════════════════════════════════════ */
.review-summary{
  display:flex;
  align-items:center;
  gap:16px;
  background:rgba(14,165,233,0.07);
  border:1px solid rgba(14,165,233,0.15);
  border-radius:10px;
  padding:14px 18px;
  margin-bottom:20px;
  flex-wrap:wrap;
}
.review-correct{color:var(--safe-green);font-weight:700;font-size:0.95rem}
.review-wrong{color:var(--rescue-red);font-weight:700;font-size:0.95rem}
.review-pct{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:1.3rem;
  color:var(--wave);
  margin-left:auto;
  letter-spacing:0.02em;
}
.review-list{display:flex;flex-direction:column}
.review-question{border-bottom:1px solid var(--border-color);padding:0 0 18px;margin-bottom:18px}
.review-question:last-child{border-bottom:none;margin-bottom:0}
.review-q-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.review-icon{font-size:1.05rem;flex-shrink:0;margin-top:2px}
.review-q-num{font-weight:700;color:var(--text-muted);flex-shrink:0;font-size:0.82rem;margin-top:3px;white-space:nowrap}
.review-q-text{font-size:0.95rem;font-weight:500;color:var(--text-primary);line-height:1.52;margin-bottom:10px}
.ordering-score-box{
  background:rgba(14,165,233,0.07);
  border:1px solid rgba(14,165,233,0.18);
  border-radius:10px;
  padding:14px 16px;
  margin-bottom:16px;
  text-align:center;
}

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media(max-width:480px){
  body{padding-top:70px}
  .card{padding:22px 16px}
  h1{font-size:1.9rem}
  h2{font-size:1.25rem}
  .chapter-grid{grid-template-columns:repeat(3,1fr)}
  .timer-badge{font-size:1.35rem}
  .stats-fab .fab-label{display:none}
  .stats-panel{max-width:100%}
  .stats-accuracy{font-size:2.4rem}
  .scenario-grid{grid-template-columns:1fr}
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// Compute global numbering (1-based) and chapter ranges
const CHAPTER_RANGES = (function(){
  const ranges = {};
  let idx = 1;
  for(let c=1;c<=9;c++){
    const qs = QUESTIONS.filter(q=>q.chapter===c);
    if(qs.length){
      ranges[c]={start:idx, end:idx+qs.length-1, count:qs.length};
      idx+=qs.length;
    }
  }
  return ranges;
})();

function globalIdxOf(q){
  return QUESTIONS.indexOf(q); // 0-based index in QUESTIONS array
}

  state.answered=false;
  state.selectedIdx=null;
  const q=state.questions[state.current];
  const opts=q.options.map((text,i)=>({text,originalIdx:i}));
  state.shuffledOptions=shuffle(opts);
}

function startTimer(fromSec){
  if(fromSec!==undefined)state.timerSec=fromSec;
  else state.timerSec=TIMED_SECONDS;
  state.startTime=Date.now();
  clearInterval(state.timerInterval);
  state.timerInterval=setInterval(()=>{
    state.timerSec--;
    updateTimerDisplay();
    if(state.timerSec<=0){
      clearInterval(state.timerInterval);
      // Auto-submit: if currently on a question and not answered, mark as wrong
      if(!state.answered && state.screen==='quiz'){
        const q=state.questions[state.current];
        state.answerHistory.push({question:q,wasCorrect:false,autoTimeout:true,selectedOriginalIdx:null});
      }
      state.timeUsed=TIMED_SECONDS;
      clearProgress();
      saveTimedResult(state.score,state.questions.length,state.timeUsed,true);
      state.screen='results';
      render();
    } else if(state.timerSec%10===0){
      saveProgress();
    }
  },1000);
}

function stopTimer(){
  clearInterval(state.timerInterval);
  state.timeUsed=TIMED_SECONDS-state.timerSec;
}

function updateTimerDisplay(){
  const el=document.getElementById('timerBadge');
  if(!el)return;
  const m=Math.floor(state.timerSec/60).toString().padStart(2,'0');
  const s=(state.timerSec%60).toString().padStart(2,'0');
  el.textContent=m+':'+s;
  el.className='timer-badge'+(state.timerSec<120?' danger':state.timerSec<300?' warn':'');
}

function fmtTime(sec){
  const m=Math.floor(sec/60);
  const s=sec%60;
  return m+'m '+s.toString().padStart(2,'0')+'s';
}

// ---- RENDER ----
function render(){
  document.getElementById('app').innerHTML=renderScreen();
  attachEvents();
}

function renderScreen(){
  switch(state.screen){
    case 'start': return renderStart();
    case 'chapter-select': return renderChapterSelect();
    case 'quiz': return renderQuiz();
    case 'results': return renderResults();
    case 'review': return renderReview();
    case 'solo': return renderSolo();
    case 'ordering-select': return renderOrderingSelect();
    case 'ordering-question': return renderOrderingQuestion();
  }
  return '';
}

function renderQuiz(){

  const isTimed=(state.mode==='timed');

  let headerHtml='';

    const m=Math.floor(state.timerSec/60).toString().padStart(2,'0');
    const s=(state.timerSec%60).toString().padStart(2,'0');
    const timerCls='timer-badge'+(state.timerSec<120?' danger':state.timerSec<300?' warn':'');
    headerHtml=`<div class="timer-row">
      <span class="meta">Teste Cronometrado — Pergunta ${state.current+1} de ${total}</span>
      <span class="${timerCls}" id="timerBadge">${m}:${s}</span>
    </div>`;
  } else {
    const chLabel=state.mode==='chapter'?`Capítulo ${state.chapterMode}`:`Capítulo ${q.chapter}`;
    headerHtml=`<div class="meta">${chLabel} — Pergunta ${state.current+1} de ${total}</div>`;
  }

  let optsHtml='';
  state.shuffledOptions.forEach((opt,i)=>{
    let cls='option-btn';
    if(state.answered){
      const isCorrect=opt.originalIdx===q.correct;
      const isSel=i===state.selectedIdx;
      if(isCorrect)cls+=' correct';
      else if(isSel&&!isCorrect)cls+=' wrong';
      else cls+=' dimmed';
    }
    optsHtml+=`<button class="${cls}" ${state.answered?'disabled':''} data-idx="${i}">
      <span class="option-label">${LABELS[i]}</span>

  <button class="back-btn" id="backBtn">&#8592; Sair do Quiz</button>

function renderOrderingQuestion(){
  const scenario=SCENARIOS[state.orderingScenarioIdx];
  const steps=scenario.steps;
  const n=steps.length;
  const confirmed=state.orderingConfirmed;

  let score=0;
  if(confirmed){
    state.orderingSteps.forEach((stepIdx,pos)=>{if(stepIdx===pos)score++;});
  }

  let itemsHtml='';
  state.orderingSteps.forEach((stepIdx,pos)=>{
    let cls='sort-item';
    let indicator='';
    if(confirmed){
      if(stepIdx===pos){cls+=' correct';indicator='<span class="sort-indicator">&#9989;</span>';}
      else{cls+=' wrong';indicator='<span class="sort-indicator">&#10060;</span>';}
    }
    itemsHtml+=`<div class="${cls}" data-step-idx="${stepIdx}">
      ${!confirmed?'<span class="sort-handle">&#10783;</span>':''}
      <span class="sort-num">${pos+1}.</span>
      <span class="sort-text">${escHtml(steps[stepIdx])}</span>
      ${indicator}
    </div>`;
  });

  let scoreSummaryHtml='';
  if(confirmed){
    const pct=Math.round(score/n*100);
    let msg=pct===100?'&#127942; Perfeito!':pct>=70?'&#128077; Muito bom!':pct>=50?'&#128218; Continua a estudar!':'&#128170; Pratica mais!';
    scoreSummaryHtml=`<div class="ordering-score-box">
      <div class="ordering-score">${score}/${n}</div>
      <div class="ordering-pct">${pct}% corretos — ${msg}</div>
    </div>`;
  }

  let correctSeqHtml='';
  if(confirmed&&score<n){
    let seqItems='';
    steps.forEach((step,i)=>{
      seqItems+=`<div class="correct-seq-item"><span class="correct-seq-num">${i+1}.</span>${escHtml(step)}</div>`;
    });
    correctSeqHtml=`<div class="correct-seq"><div class="correct-seq-title">&#128203; Sequência correta:</div>${seqItems}</div>`;
  }

  const numLabel=String(state.orderingScenarioIdx+1).padStart(2,'0');
  return `<div class="card">
  <button class="back-btn" id="backBtn">&#8592; Voltar aos Cenários</button>
  <div class="meta">Cenário ${numLabel} — ${escHtml(scenario.title)}</div>
  <div class="scenario-context">${escHtml(scenario.context)}</div>
  ${scoreSummaryHtml}
  <div id="sortList" class="sort-list">${itemsHtml}</div>
  ${!confirmed?`<button class="btn btn-success" id="confirmBtn">&#10004; Confirmar Ordem</button>`:''}
  ${correctSeqHtml}
  ${confirmed?`<div style="display:flex;gap:10px;margin-top:16px">
    <button class="btn btn-secondary" id="retryBtn" style="flex:1;text-align:center">&#128260; Tentar novamente</button>
    <button class="btn btn-primary" id="backScenBtn" style="flex:1;text-align:center">&#8592; Cenários</button>
  </div>`:''}
</div>`;
}

function renderResults(){
  const total=state.questions.length;
  const pct=Math.round(state.score/total*100);
  let icon,msg;
  if(pct>=90){icon='🏆';msg='Excelente! Resultado brilhante!';}
  else if(pct>=70){icon='👍';msg='Muito bom! Continua assim!';}
  else if(pct>=50){icon='📚';msg='Bom esforço! Continua a estudar.';}
  else{icon='💪';msg='Continua a praticar — vais melhorar!';}

  const isTimed=(state.mode==='timed');
  let timeHtml='';
  if(isTimed){
    timeHtml=`<div class="result-time">&#9201; Tempo utilizado: <strong>${fmtTime(state.timeUsed)}</strong> de 20:00</div>`;
  }
  const savedHtml=isTimed?`<div style="font-size:.85rem;color:#0e9f6e;font-weight:600;margin-top:4px;margin-bottom:2px">✓ Este resultado foi guardado nas suas estatísticas.</div>`:'';


  // Breakdown (timed only)
  let breakdownHtml='';
  if(isTimed && state.answerHistory.length>0){
    let rows='';
    state.answerHistory.forEach((h,i)=>{
      const icon2=h.wasCorrect?'✅':'❌';
      const cls=h.wasCorrect?'ok':'fail';
      const correctText=h.question.options[h.question.correct];
      rows+=`<div class="breakdown-item ${cls}">
        <span class="breakdown-num">${i+1}.</span>
        <span class="breakdown-icon">${icon2}</span>
        <div class="breakdown-text">
          <div style="font-weight:600;margin-bottom:2px">${escHtml(h.question.question.length>90?h.question.question.slice(0,90)+'…':h.question.question)}</div>
          ${!h.wasCorrect?`<div style="color:#059669;font-size:.83rem">✓ ${escHtml(correctText)}</div>`:''}
        </div>
      </div>`;
    });
    breakdownHtml=`<div class="divider"></div><div style="text-align:left;font-weight:600;font-size:.9rem;margin-bottom:8px;color:#4a6080">Detalhes por pergunta:</div><div class="breakdown">${rows}</div>`;
  }

  const modeLabel=state.mode==='timed'?'Teste Cronometrado':state.mode==='chapter'?`Capítulo ${state.chapterMode}`:'Todos os capítulos';

  const reviewBtnHtml=state.answerHistory.length>0?`<button class="btn btn-secondary" id="reviewBtn" style="margin-top:10px;text-align:center">&#128203; Rever Respostas</button>`:'';

  return `<div class="card result-card">
  <div class="result-icon">${icon}</div>
  <h1>Resultado Final</h1>
  <p class="subtitle">${modeLabel}</p>
  <div class="result-score">${state.score}/${total}</div>
  <div class="result-pct">${pct}% corretos</div>
  <p class="result-msg">${msg}</p>
  ${timeHtml}
  ${savedHtml}
  <div class="divider"></div>
  <button class="btn btn-primary" id="restartBtn">&#8635; Recomeçar</button>
  ${reviewBtnHtml}
  ${breakdownHtml}
</div>`;
}

// ---- EVENTS ----
function attachEvents(){
  const $ = id => document.getElementById(id);
  switch(state.screen){
    case 'start':
      $('btnRandom')&&$('btnRandom').addEventListener('click',startRandom);
      $('btnChapter')&&$('btnChapter').addEventListener('click',showChapterSelect);
      $('btnTimed')&&$('btnTimed').addEventListener('click',startTimed);
      $('btnOrdering')&&$('btnOrdering').addEventListener('click',startOrderingMode);
      $('searchBtn')&&$('searchBtn').addEventListener('click',doSearch);
      $('searchInput')&&$('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
      $('resumeBtn')&&$('resumeBtn').addEventListener('click',resumeProgress);
      $('discardBtn')&&$('discardBtn').addEventListener('click',()=>{clearProgress();render();});
      break;
    case 'chapter-select':
      $('backBtn')&&$('backBtn').addEventListener('click',goStart);
      document.querySelectorAll('.chapter-btn').forEach(btn=>{
        btn.addEventListener('click',()=>startChapter(parseInt(btn.dataset.ch)));
      });
      break;
    case 'quiz':
      $('backBtn')&&$('backBtn').addEventListener('click',()=>{stopTimer();goStart();});
      document.querySelectorAll('.option-btn').forEach(btn=>{
        btn.addEventListener('click',function(){
          if(state.answered)return;
          answer(parseInt(this.dataset.idx));
        });
      });
      $('continueBtn')&&$('continueBtn').addEventListener('click',next);
      break;
    case 'results':
      $('restartBtn')&&$('restartBtn').addEventListener('click',goStart);
      $('reviewBtn')&&$('reviewBtn').addEventListener('click',()=>{state.screen='review';render();});
      break;
    case 'review':
      $('backBtn')&&$('backBtn').addEventListener('click',()=>{state.screen='results';render();});
      break;
    case 'solo':
      $('backBtn')&&$('backBtn').addEventListener('click',goStart);
      $('backBtn2')&&$('backBtn2').addEventListener('click',goStart);
      document.querySelectorAll('.option-btn').forEach(btn=>{
        btn.addEventListener('click',function(){
          if(state.answered)return;
          answerSolo(parseInt(this.dataset.idx));
        });
      });
      break;
    case 'ordering-select':
      $('backBtn')&&$('backBtn').addEventListener('click',goStart);
      document.querySelectorAll('.scenario-btn').forEach(btn=>{
        btn.addEventListener('click',()=>startOrderingScenario(parseInt(btn.dataset.idx)));
      });
      break;
    case 'ordering-question':
      $('backBtn')&&$('backBtn').addEventListener('click',goOrderingSelect);
      $('confirmBtn')&&$('confirmBtn').addEventListener('click',confirmOrdering);
      $('retryBtn')&&$('retryBtn').addEventListener('click',retryOrdering);
      $('backScenBtn')&&$('backScenBtn').addEventListener('click',goOrderingSelect);
      if(!state.orderingConfirmed)attachOrderingDnd();
      break;
  }
}

function escHtml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function answer(idx){
  state.answered=true;
  state.selectedIdx=idx;
  const q=state.questions[state.current];
  const chosen=state.shuffledOptions[idx];
  const wasCorrect=chosen.originalIdx===q.correct;
  if(wasCorrect)state.score++;
  state.answerHistory.push({question:q,wasCorrect,selectedOriginalIdx:chosen.originalIdx});
  render();
  if(state.mode==='timed')updateTimerDisplay();
}

function answerSolo(idx){
  state.answered=true;
  state.selectedIdx=idx;
  render();
}

function next(){
  state.current++;
  if(state.current>=state.questions.length){
    if(state.mode==='timed'){stopTimer();saveTimedResult(state.score,state.questions.length,state.timeUsed,false);}
    clearProgress();
    state.screen='results';
  } else {
    loadQuestion();
    saveProgress();
  }
  render();
  if(state.mode==='timed')updateTimerDisplay();
}

function startRandom(){
  state.mode='random';
  state.chapterMode=null;
  state.screen='quiz';
  prepareQuiz(QUESTIONS);
  render();
}

function startTimed(){
  state.mode='timed';
  state.chapterMode=null;
  state.screen='quiz';
  // Build chapter buckets and pick 2 per chapter
  const byChapter={};
  QUESTIONS.forEach(q=>{const c=q.chapter||0;(byChapter[c]||(byChapter[c]=[])).push(q);});
  const picked=[];
  Object.values(byChapter).forEach(qs=>shuffle(qs).slice(0,2).forEach(q=>picked.push(q)));
  // If fewer than TIMED_COUNT (e.g. only 9 chapters → 18 qs), top up with random extras
  if(picked.length<TIMED_COUNT){
    const usedIds=new Set(picked.map(q=>q.id));
    const extras=shuffle(QUESTIONS.filter(q=>!usedIds.has(q.id)));
    extras.slice(0,TIMED_COUNT-picked.length).forEach(q=>picked.push(q));
  }
  prepareQuiz(shuffle(picked));
  render();
  startTimer();
  saveProgress();
}

function showChapterSelect(){
  state.screen='chapter-select';
  render();
}

function startChapter(ch){
  state.mode='chapter';
  state.chapterMode=ch;
  state.screen='quiz';
  prepareQuiz(QUESTIONS.filter(q=>q.chapter===ch));
  render();
  saveProgress();
}

function goStart(){
  clearInterval(state.timerInterval);
  clearProgress();
  state.screen='start';
  state.mode=null;
  state.chapterMode=null;
  render();
}

function doSearch(){
  const input=document.getElementById('searchInput');
  const errEl=document.getElementById('searchError');
  const val=parseInt(input.value);
  if(!val||val<1||val>QUESTIONS.length){
    errEl.textContent='Número inválido. Insere um valor entre 1 e '+QUESTIONS.length+'.';
    return;
  }
  errEl.textContent='';
  const q=QUESTIONS[val-1];
  state.screen='solo';
  state.mode='solo';
  state.soloQ=q;
  state.soloGlobalNum=val;
  state.answered=false;
  state.selectedIdx=null;
  const opts=q.options.map((text,i)=>({text,originalIdx:i}));
  state.shuffledOptions=shuffle(opts);
  render();
}

// ---- ORDERING MODE ----
function startOrderingMode(){
  state.screen='ordering-select';
  render();
}

function startOrderingScenario(idx){
  const n=SCENARIOS[idx].steps.length;
  state.orderingScenarioIdx=idx;
  state.orderingSteps=shuffle([...Array(n).keys()]);
  state.orderingConfirmed=false;
  state.screen='ordering-question';
  render();
}

function confirmOrdering(){
  // Sync DOM order into state one final time before confirming
  const list=document.getElementById('sortList');
  if(list){
    state.orderingSteps=Array.from(list.querySelectorAll('.sort-item'))
      .map(el=>parseInt(el.dataset.stepIdx));
  }
  state.orderingConfirmed=true;
  render();
}

function retryOrdering(){
  startOrderingScenario(state.orderingScenarioIdx);
}

function goOrderingSelect(){
  state.screen='ordering-select';
  state.orderingConfirmed=false;
  render();
}

function attachOrderingDnd(){
  const list=document.getElementById('sortList');
  if(!list||state.orderingConfirmed)return;

  let dnd=null;

  // Returns all real items (excludes placeholder)
  function getItems(){
    return Array.from(list.querySelectorAll('.sort-item:not(.sort-placeholder)'));
  }

  // Find the item whose top-half the cursor is above → insert before it
  function findTarget(clientY){
    for(const el of getItems()){
      const r=el.getBoundingClientRect();
      if(clientY<r.top+r.height/2)return el;
    }
    return null; // cursor below all items → append at end
  }

  // FLIP: capture positions before a DOM change, animate from old→new after
  function flip(items,beforeTops){
    items.forEach((el,i)=>{
      const dy=beforeTops[i]-el.getBoundingClientRect().top;
      if(Math.abs(dy)<1)return;
      el.style.transition='none';
      el.style.transform='translateY('+dy+'px)';
      el.getBoundingClientRect(); // force reflow so the above is applied
      el.style.transition=''; // re-enable CSS transition (transform .18s ease)
      el.style.transform=''; // animate to natural position
    });
  }

  // Move the placeholder to the right slot and FLIP remaining items
  function movePlaceholder(cursorY){
    const target=findTarget(cursorY);
    const key=target?target.dataset.stepIdx:'__end__';
    if(key===dnd.lastKey)return; // already in correct slot, skip work
    dnd.lastKey=key;
    const items=getItems();
    const tops=items.map(el=>el.getBoundingClientRect().top);
    if(target)list.insertBefore(dnd.ph,target);
    else list.appendChild(dnd.ph);
    flip(items,tops);
  }

  function startDrag(item,clientX,clientY){
    const rect=item.getBoundingClientRect();

    // Ghost: a fixed-position clone that follows the cursor
    const ghost=item.cloneNode(true);
    ghost.classList.add('sort-ghost');
    ghost.style.cssText=[
      'position:fixed',
      'left:'+rect.left+'px',
      'top:'+rect.top+'px',
      'width:'+rect.width+'px',
      'margin:0',
      'z-index:9999',
      'pointer-events:none',
      'box-sizing:border-box',
      'transition:none',
    ].join(';');
    document.body.appendChild(ghost);

    // Placeholder: invisible spacer that holds the drop slot open
    const ph=document.createElement('div');
    ph.className='sort-placeholder';
    ph.style.height=rect.height+'px';
    list.insertBefore(ph,item);
    item.remove(); // detach real item; ghost is its visual stand-in

    dnd={
      item,ghost,ph,
      offsetX:clientX-rect.left,
      offsetY:clientY-rect.top,
      height:rect.height,
      lastKey:null,
    };
  }

  function moveDrag(clientX,clientY){
    if(!dnd)return;
    // Move ghost to follow cursor
    dnd.ghost.style.left=(clientX-dnd.offsetX)+'px';
    dnd.ghost.style.top=(clientY-dnd.offsetY)+'px';
    // Use ghost center Y to determine placeholder slot
    movePlaceholder(clientY-dnd.offsetY+dnd.height/2);
  }

  function endDrag(){
    if(!dnd)return;
    const{item,ghost,ph}=dnd;
    dnd=null;

    // Animate ghost to placeholder position, then snap real item in
    const pr=ph.getBoundingClientRect();
    ghost.style.transition='left .14s ease,top .14s ease,opacity .14s ease,transform .14s ease';
    ghost.style.left=pr.left+'px';
    ghost.style.top=pr.top+'px';
    ghost.style.transform='none';
    ghost.style.opacity='0.2';

    setTimeout(()=>{
      list.insertBefore(item,ph);
      ph.remove();
      ghost.remove();
      // Clear any in-progress FLIP transforms
      getItems().forEach(el=>{el.style.transform='';el.style.transition='';});
      // Sync logical order to state
      state.orderingSteps=Array.from(list.querySelectorAll('.sort-item'))
        .map(el=>parseInt(el.dataset.stepIdx));
    },150);
  }

  // ── Mouse ──────────────────────────────────────────────────────────
  list.addEventListener('mousedown',function(e){
    if(state.orderingConfirmed)return;
    const handle=e.target.closest('.sort-handle');
    if(!handle)return;
    const item=handle.closest('.sort-item');
    if(!item)return;
    e.preventDefault();
    startDrag(item,e.clientX,e.clientY);
    function mm(ev){moveDrag(ev.clientX,ev.clientY);}
    function mu(){
      endDrag();
      document.removeEventListener('mousemove',mm);
      document.removeEventListener('mouseup',mu);
    }
    document.addEventListener('mousemove',mm);
    document.addEventListener('mouseup',mu);
  });

  // ── Touch ──────────────────────────────────────────────────────────
  list.addEventListener('touchstart',function(e){
    if(state.orderingConfirmed)return;
    const handle=e.target.closest('.sort-handle');
    if(!handle)return;
    const item=handle.closest('.sort-item');
    if(!item)return;
    e.preventDefault();
    const t=e.touches[0];
    startDrag(item,t.clientX,t.clientY);
    function tm(ev){
      ev.preventDefault();
      const t2=ev.touches[0];
      moveDrag(t2.clientX,t2.clientY);
    }
    function tu(){
      endDrag();
      document.removeEventListener('touchmove',tm);
      document.removeEventListener('touchend',tu);
      document.removeEventListener('touchcancel',tu);
    }
    document.addEventListener('touchmove',tm,{passive:false});
    document.addEventListener('touchend',tu);
    document.addEventListener('touchcancel',tu);
  },{passive:false});
}

// ---- STATISTICS ----
const HISTORY_KEY='quiz_ns_history';
const HISTORY_MAX=50;

function getHistory(){
  try{return JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');}catch(e){return[];}
}

function saveTimedResult(score,total,timeUsedSec,timedOut){
  const history=getHistory();
  const percentage=Math.round(score/total*100);
  const mm=Math.floor(timeUsedSec/60).toString().padStart(2,'0');
  const ss=(timeUsedSec%60).toString().padStart(2,'0');
  history.unshift({date:new Date().toISOString(),score,total,percentage,timeUsed:mm+':'+ss,timedOut});
  if(history.length>HISTORY_MAX)history.length=HISTORY_MAX;
  try{localStorage.setItem(HISTORY_KEY,JSON.stringify(history));}catch(e){}
}

function fmtDate(iso){
  const d=new Date(iso);
  const dd=d.getDate().toString().padStart(2,'0');
  const mm=(d.getMonth()+1).toString().padStart(2,'0');
  const hh=d.getHours().toString().padStart(2,'0');
  const mi=d.getMinutes().toString().padStart(2,'0');
  return dd+'/'+mm+' '+hh+':'+mi;
}

function renderTrendChart(history){
  const last10=[...history].slice(0,10).reverse();
  if(last10.length<2)return `<div style="font-size:.82rem;color:#9cb0cc;padding:8px 0">Precisas de pelo menos 2 testes para ver a tendência.</div>`;
  const W=300,H=110,PL=30,PR=36,PT=10,PB=22;
  const cW=W-PL-PR,cH=H-PT-PB;
  const mean=last10.reduce((a,b)=>a+b.percentage,0)/last10.length;
  const xStep=last10.length>1?cW/(last10.length-1):cW;
  const yS=v=>PT+cH-(v/100)*cH;
  const pts=last10.map((e,i)=>({x:PL+i*xStep,y:yS(e.percentage),p:e.percentage}));
  const poly=pts.map(p=>p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');
  const meanY=yS(mean).toFixed(1);
  const gridLines=[0,25,50,75,100].map(v=>{
    const gy=yS(v).toFixed(1);
    return `<line x1="${PL}" y1="${gy}" x2="${PL+cW}" y2="${gy}" stroke="#e0ebff" stroke-width="1"/>
    <text x="${PL-4}" y="${parseFloat(gy)+4}" text-anchor="end" fill="#b0c8e0" font-size="8">${v}</text>`;
  }).join('');
  const dots=pts.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="${p.p>=70?'#0e9f6e':p.p>=50?'#d97706':'#e02424'}" stroke="#fff" stroke-width="1.5"/>`).join('');
  const xLabels=pts.map((p,i)=>{
    if(pts.length<=6||i===0||i===pts.length-1)
      return `<text x="${p.x.toFixed(1)}" y="${H-4}" text-anchor="middle" fill="#b0c8e0" font-size="8">${history.length-(last10.length-1-i)}</text>`;
    return '';
  }).join('');
  return `<div class="stats-chart">
    <div style="font-size:.78rem;font-weight:600;color:#4a6080;margin-bottom:8px">Últimos ${last10.length} testes</div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;max-height:110px;display:block">
      ${gridLines}
      <line x1="${PL}" y1="${meanY}" x2="${PL+cW}" y2="${meanY}" stroke="#1a56db" stroke-width="1.2" stroke-dasharray="5,3" opacity=".55"/>
      <text x="${PL+cW+3}" y="${parseFloat(meanY)+4}" fill="#1a56db" font-size="8" opacity=".7">${Math.round(mean)}%</text>
      <polyline points="${poly}" fill="none" stroke="#3b82f6" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
      ${xLabels}
    </svg>
    <div style="font-size:.74rem;color:#9cb0cc;margin-top:4px">Linha tracejada = média (${mean.toFixed(1)}%)</div>
  </div>`;
}

function renderStatsPanelContent(){
  const history=getHistory();
  let html=`<div class="stats-title">📊 Estatísticas</div>`;
  if(history.length===0){
    return html+`<div class="stats-empty">Ainda não realizou nenhum teste cronometrado.<br><br>Complete um <strong>Teste Cronometrado</strong> para ver as suas estatísticas aqui.</div>`;
  }
  const mean=history.reduce((a,b)=>a+b.percentage,0)/history.length;
  const best=Math.max(...history.map(e=>e.percentage));
  const worst=Math.min(...history.map(e=>e.percentage));
  const avgSec=history.reduce((a,b)=>{const p=b.timeUsed.split(':');return a+parseInt(p[0])*60+parseInt(p[1]);},0)/history.length;
  const avgMM=Math.floor(avgSec/60).toString().padStart(2,'0');
  const avgSS=Math.round(avgSec%60).toString().padStart(2,'0');

  html+=`<div class="stats-summary">
    <div class="stats-accuracy">${mean.toFixed(1)}%</div>
    <div class="stats-accuracy-label">Índice de Acerto (média global)</div>
    <div class="stats-grid">
      <div class="stats-stat"><div class="stats-stat-val">${history.length}</div><div class="stats-stat-lbl">Testes realizados</div></div>
      <div class="stats-stat"><div class="stats-stat-val">${best}%</div><div class="stats-stat-lbl">Melhor resultado</div></div>
      <div class="stats-stat"><div class="stats-stat-val">${worst}%</div><div class="stats-stat-lbl">Pior resultado</div></div>
      <div class="stats-stat"><div class="stats-stat-val">${avgMM}:${avgSS}</div><div class="stats-stat-lbl">Tempo médio</div></div>
    </div>
  </div>`;

  html+=`<div class="stats-section-title">Tendência</div>`;
  html+=renderTrendChart(history);

  html+=`<div class="stats-section-title">Histórico</div>`;
  let rows='';
  history.forEach((e,i)=>{
    const rowCls=e.percentage>=70?'hist-row-green':e.percentage>=50?'hist-row-orange':'hist-row-red';
    rows+=`<tr class="${rowCls}">
      <td style="color:#6b84a0">${history.length-i}</td>
      <td>${fmtDate(e.date)}</td>
      <td>${e.score}/${e.total}</td>
      <td><strong>${e.percentage}%</strong></td>
      <td>${e.timeUsed}</td>
      <td style="font-size:1rem">${e.timedOut?'⏱️':'✅'}</td>
    </tr>`;
  });
  html+=`<div class="hist-wrap"><table class="hist-table">
    <thead><tr><th>#</th><th>Data</th><th>Acertos</th><th>%</th><th>Tempo</th><th>Estado</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;

  html+=`<div style="margin-top:24px">
    <button class="btn-danger" id="clearBtn">🗑️ Limpar Histórico</button>
    <div id="clearConfirm" style="display:none">
      <div style="color:#dc2626;font-size:.87rem;margin:10px 0 6px;font-weight:600">Tem a certeza? Esta ação é irreversível.</div>
      <div class="confirm-row">
        <button class="btn btn-primary" id="clearYes" style="background:#dc2626;text-align:center">Sim, limpar</button>
        <button class="btn btn-secondary" id="clearNo" style="text-align:center">Cancelar</button>
      </div>
    </div>
  </div>`;
  return html;
}

function attachStatsPanelEvents(){
  const clearBtn=document.getElementById('clearBtn');
  const clearConfirm=document.getElementById('clearConfirm');
  const clearYes=document.getElementById('clearYes');
  const clearNo=document.getElementById('clearNo');
  if(clearBtn)clearBtn.addEventListener('click',()=>{
    clearBtn.style.display='none';
    if(clearConfirm)clearConfirm.style.display='';
  });
  if(clearYes)clearYes.addEventListener('click',()=>{
    localStorage.removeItem(HISTORY_KEY);
    document.getElementById('statsPanelContent').innerHTML=renderStatsPanelContent();
    attachStatsPanelEvents();
  });
  if(clearNo)clearNo.addEventListener('click',()=>{
    if(clearConfirm)clearConfirm.style.display='none';
    if(clearBtn)clearBtn.style.display='';
  });
}

function showStats(){
  const overlay=document.getElementById('statsOverlay');
  if(!overlay)return;
  overlay.classList.remove('hidden');
  document.body.style.overflow='hidden';
  document.getElementById('statsPanelContent').innerHTML=renderStatsPanelContent();
  attachStatsPanelEvents();
}

function hideStats(){
  const overlay=document.getElementById('statsOverlay');
  if(overlay)overlay.classList.add('hidden');
  document.body.style.overflow='';
}

// ---- DARK MODE ----
function initDarkMode(){
  const stored=localStorage.getItem('ns_darkmode');
  const dark=stored!==null?stored==='1':window.matchMedia('(prefers-color-scheme:dark)').matches;
  applyDarkMode(dark);
}
function applyDarkMode(dark){
  document.body.classList.toggle('dark',dark);
  const btn=document.getElementById('darkFab');
  if(btn)btn.textContent=dark?'☀️':'🌙';
}
function toggleDarkMode(){
  const dark=document.body.classList.toggle('dark');
  localStorage.setItem('ns_darkmode',dark?'1':'0');
  const btn=document.getElementById('darkFab');
  if(btn)btn.textContent=dark?'☀️':'🌙';
}

// ---- PROGRESS PERSISTENCE ----
const PROGRESS_KEY='ns_progress';
function saveProgress(){
  if((state.mode!=='chapter'&&state.mode!=='timed')||state.screen!=='quiz')return;
  const data={
    mode:state.mode,
    chapterMode:state.chapterMode,
    questionIndices:state.questions.map(q=>QUESTIONS.indexOf(q)),
    current:state.current,
    score:state.score,
    answerHistory:state.answerHistory.map(h=>({
      qIdx:QUESTIONS.indexOf(h.question),
      wasCorrect:h.wasCorrect,
      selectedOriginalIdx:h.selectedOriginalIdx!=null?h.selectedOriginalIdx:null
    })),
    timerSec:state.timerSec
  };
  try{localStorage.setItem(PROGRESS_KEY,JSON.stringify(data));}catch(e){}
}
function loadProgress(){
  try{return JSON.parse(localStorage.getItem(PROGRESS_KEY)||'null');}catch(e){return null;}
}
function clearProgress(){
  localStorage.removeItem(PROGRESS_KEY);
}
function resumeProgress(){
  const saved=loadProgress();
  if(!saved)return;
  clearProgress();
  state.mode=saved.mode;
  state.chapterMode=saved.chapterMode;
  state.questions=saved.questionIndices.map(i=>QUESTIONS[i]);
  state.current=saved.current;
  state.score=saved.score;
  state.answered=false;
  state.selectedIdx=null;
  state.answerHistory=saved.answerHistory.map(h=>({
    question:QUESTIONS[h.qIdx],
    wasCorrect:h.wasCorrect,
    selectedOriginalIdx:h.selectedOriginalIdx
  }));
  state.timerSec=saved.timerSec!=null?saved.timerSec:TIMED_SECONDS;
  state.screen='quiz';
  loadQuestion();
  render();
  if(state.mode==='timed')startTimer(state.timerSec);
}

// ---- REVIEW SCREEN ----
function renderReview(){
  const history=state.answerHistory;
  const total=history.length;
  const correct=history.filter(h=>h.wasCorrect).length;
  const wrong=total-correct;
  const pct=total>0?Math.round(correct/total*100):0;
  let questionsHtml='';
  history.forEach((h,i)=>{
    const q=h.question;
    const hIcon=h.wasCorrect?'&#9989;':'&#10060;';
    let optsHtml='';
    q.options.forEach((text,origIdx)=>{
      const isCorrect=origIdx===q.correct;
      const isSel=h.selectedOriginalIdx!=null&&origIdx===h.selectedOriginalIdx;
      let cls='option-btn';
      if(isCorrect)cls+=' correct';
      else if(isSel)cls+=' wrong';
      else cls+=' dimmed';
      optsHtml+=`<button class="${cls}" disabled>
        <span class="option-label">${LABELS[origIdx]}</span>
        <span>${escHtml(text)}</span>
      </button>`;
    });
    questionsHtml+=`<div class="review-question">
      <div class="review-q-header">
        <span class="review-icon">${hIcon}</span>
        <span class="review-q-num">Pergunta ${i+1}</span>
      </div>
      <div class="review-q-text">${escHtml(q.question)}</div>
      <div class="options" style="margin-top:10px">${optsHtml}</div>
    </div>`;
  });
  return `<div class="card">
  <button class="back-btn" id="backBtn">&#8592; Voltar aos Resultados</button>
  <h2>&#128203; Revisão de Respostas</h2>
  <div class="review-summary">
    <span class="review-correct">&#9989; ${correct} corretas</span>
    <span class="review-wrong">&#10060; ${wrong} erradas</span>
    <span class="review-pct">${pct}%</span>
  </div>
  <div class="review-list">${questionsHtml}</div>
</div>`;
}

render();

// Stats button and overlay events (set up once, not re-rendered)
document.getElementById('statsFab').addEventListener('click',showStats);
document.getElementById('statsClose').addEventListener('click',hideStats);
document.getElementById('statsOverlay').addEventListener('click',function(e){
  if(e.target===this)hideStats();
});
initDarkMode();
document.getElementById('darkFab').addEventListener('click',toggleDarkMode);
</script>
